services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: neuralia
      POSTGRES_PASSWORD: password
      POSTGRES_DB: neuralia_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuralia -d neuralia_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin

    environment:
      PGADMIN_DEFAULT_EMAIL: neuralia@pgadmin.com
      PGADMIN_DEFAULT_PASSWORD: password
      PGADMIN_LISTEN_PORT: 80

    ports:
      - "5050:80"

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    depends_on:
      postgres:
        condition: service_healthy

    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend

    environment:
      # Driver "psycopg" côté SQLAlchemy
      DATABASE_URL: postgresql+psycopg://neuralia:password@postgres:5432/neuralia_db

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/workspace

    depends_on:
      postgres:
        condition: service_healthy

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
      API_INTERNAL_URL: "http://backend:8000"
    volumes:
      - ./frontend:/workspace
      - /workspace/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    
volumes:
  postgres_data:
  pgadmin_data:


